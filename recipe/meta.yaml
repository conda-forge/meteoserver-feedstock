{% set name = "meteoserver" %}
{% set version = "0.0.19" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/MarcvdSluys/Meteoserver/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c6dfb246653f2fd1c61d9e88d6352098c569334c099b3e8471974afc7d201d90

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - requests

test:
  imports:
    - meteoserver
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MarcvdSluys/Meteoserver
  summary: A Python module to obtain and read Dutch weather data from Meteoserver.nl
  license: GPL-3.0-or-later
  license_file: LICENCE

extra:
  recipe-maintainers:
    - ocefpaf
